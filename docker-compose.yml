services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: galaxy-map-backend
    ports:
      - "8000:8000"
    volumes:
      - /data/galaxy-map/data:/app/data
    environment:
      - DATABASE_PATH=/app/data/board.db
    networks:
      - galaxy-map

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: galaxy-map-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - galaxy-map

  mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: galaxy-map-mcp
    ports:
      - "10001:8080"
    environment:
      - GALAXY_MAP_URL=http://backend:8000
      - MCP_TRANSPORT=streamable-http
    depends_on:
      - backend
    networks:
      - galaxy-map
      - sr2

volumes:
  db-data:

networks:
  galaxy-map:
    external: false
  sr2:          
    external: true                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
    name: normandy-master_sr2